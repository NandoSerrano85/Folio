[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "folio_core"
version = "0.1.0"
description = "Shared spine for Folio: config, db, models, hashing, exif, paths, crypto, logging."
readme = "README.md"
requires-python = ">=3.12"
license = { text = "Proprietary" }
authors = [{ name = "Folio" }]
dependencies = [
    "sqlalchemy>=2,<3",
    "psycopg[binary]>=3",
    "pydantic>=2",
    "pydantic-settings>=2",
    "alembic>=1.13",
    "cryptography",
    "python-dateutil",
]

[tool.setuptools]
# Ship the migrations dir alongside the importable package so that
# `alembic upgrade head` works from any service image.
packages = ["folio_core"]
include-package-data = true

[tool.setuptools.package-data]
folio_core = ["py.typed"]
