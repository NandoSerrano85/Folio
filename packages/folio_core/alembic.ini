# Alembic configuration for folio_core.
#
# The actual database URL is injected at runtime from folio_core.config
# (see migrations/env.py), so the sqlalchemy.url below is a placeholder only.

[alembic]
script_location = %(here)s/migrations
prepend_sys_path = .
# Use a timestamped, zero-padded slug-friendly revision scheme.
file_template = %%(rev)s_%%(slug)s
timezone = UTC

# Placeholder; overridden in env.py by DATABASE_URL.
sqlalchemy.url = postgresql+psycopg://folio:folio@db:5432/folio

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
